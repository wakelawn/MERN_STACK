<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Thala Store</title>
  </head>
  <body>
    <header>
      <div class="containers">
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
      </div>
      <nav class="nav-bar">
        <div class="nav-bar-logo">
          <div><span id="t-1">Thala</span><span id="t-2">7.</span></div>
        </div>

        <div class="nav-bar-main">
          <ul>
            <li><div class="nav-bar-home">Home</div></li>
            <li><div class="nav-bar-about">About</div></li>
            <li><div class="nav-bar-brands">Brands</div></li>
            <li><div class="nav-bar-more">More</div></li>
            <li><div class="nav-bar-contact">Contact</div></li>
          </ul>
        </div>

        <div class="nav-right">
          <div class="nav-bar-search">
            <div>
              <span class="icon-search"
                ><img src="magnifying-glass-solid-full.svg" alt="search"
              /></span>
              <input type="text" placeholder="Search" />
            </div>
          </div>

          <div class="nav-bar-add-to-cart">
            <div>
              <span class="icon-cart"
                ><img src="cart-arrow-down-solid-full.svg" alt="cart"
              /></span>
              <button>0</button>
            </div>
          </div>

          <div class="nav-bar-pp">
            <img
              src="simple_flower_image_2K_202606151316.jpeg"
              alt="logo"
            />
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="left">
          <span class="hero-brand">SEVEN</span>
          <h1>7!! Thala For a <span>Reason!</span></h1>
          <p>
            Premium sneakers for the fans who like clean style, bold energy, and
            a fresh everyday look.
          </p>
          <span class="hero-cta"><button>Shop Now</button></span>
        </div>
        <div class="right">
          <div class="shoe-stage">
            <img
              class="shoe-art"
              src="shoe.png"
              alt="Sneaker image"
            />
          </div>
        </div>
      </section>
    </main>

    <footer>
      <section class="service">
        <div class="service-card">
          <span class="service-icon"><img src="comment.png" alt=""></span>
          <div>
            <strong>2k+</strong>
            <span>Reviews</span>
          </div>
        </div>
        <div class="service-card">
          <span class="service-icon">◉</span>
          <div>
            <strong>30k+</strong>
            <span>Customers</span>
          </div>
        </div>
        <div class="service-card">
          <span class="service-icon">⬟</span>
          <div>
            <strong>High</strong>
            <span>Quality</span>
          </div>
        </div>
        <div class="service-card">
          <span class="service-icon">✦</span>
          <div>
            <strong>4.5/5</strong>
            <span>Rating</span>
          </div>
        </div>
      </section>
    </footer>
  </body>
</html>
