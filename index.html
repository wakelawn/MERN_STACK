<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laundry Walla</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header></header>

    <nav></nav>
    <main>
      <div class="container">
        <div class="side-left">
          <img
            src="just_the_washing_achine_illustration_202605311403.jpeg"
            alt="Image"
          />
        </div>
        <div class="side-right">
          <form>
            <div class="heading">
              <h2>Welcome to Laundy wallah!</h2>
              <p>We missed you!!</p>
            </div>
            <div class="login-grp">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                placeholder="Enter your email address"
              />
            </div>
            <div class="login-grp">
              <label for="pass">Password</label
              ><input
                type="password"
                id="pass"
                placeholder="Enter your password"
              />
              <button>Forgot password?</button>
            </div>

            <div class="login-grp butt"><button>Login</button></div>
            <div>
              <p>Not a member? <a href="#">Register Now</a></p>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer></footer>
  </body>
</html>
